name: Sync Keepa Buy Box

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    # Run shortly after the daily Sellerboard sync
    - cron: "0 4 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Keepa buy box sync
        id: sync_keepa
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          KEEPA_API_KEYS: ${{ secrets.KEEPA_API_KEYS }}
          KEEPA_TOKENS_PER_MINUTE: ${{ secrets.KEEPA_TOKENS_PER_MINUTE || '1' }}
          KEEPA_TOKEN_SAFETY_REMAINING: ${{ secrets.KEEPA_TOKEN_SAFETY_REMAINING || '0' }}
          KEEPA_BATCH_SIZE: ${{ secrets.KEEPA_BATCH_SIZE || '1' }}
          KEEPA_ITEMS_PER_RUN: ${{ secrets.KEEPA_ITEMS_PER_RUN || '0' }}
          KEEPA_MAX_REQUESTS_PER_RUN: ${{ secrets.KEEPA_MAX_REQUESTS_PER_RUN || '60' }}
          KEEPA_MAX_RUNTIME_MS: ${{ secrets.KEEPA_MAX_RUNTIME_MS || '17400000' }} # 4h50m
          SUPABASE_ADMIN_USER_ID: ${{ secrets.SUPABASE_ADMIN_USER_ID }}
          KEEPA_UPDATE_ALL_PRODUCTS: ${{ secrets.KEEPA_UPDATE_ALL_PRODUCTS || '0' }}
        run: |
          set +e
          # 330m (5h30) guard; script are propria limită internă.
          timeout --signal=TERM --kill-after=30s 330m pnpm run sync-keepa-buybox
          exit_code=$?
          if [ "$exit_code" -eq 124 ]; then
            echo "Keepa BB sync at runtime guard; ending green for relaunch."
            exit 0
          fi
          exit "$exit_code"

      - name: Relaunch immediately
        if: ${{ success() && steps.sync_keepa.outputs.stopped_for_tokens != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const workflowId = 'sync-keepa-buybox.yml';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 5
            });
            const hasActive = (data.workflow_runs || []).some((r) =>
              r.id !== context.runId &&
              ['in_progress','queued','waiting','requested'].includes(r.status)
            );
            if (hasActive) {
              core.info('Există deja un run activ/queued; nu relansăm.');
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: 'main'
            });
            core.info('Am trimis un nou run prin workflow_dispatch.');
